version: 2

sources:
  - name: portfolio_platform
    description: Canonical SQLite warehouse generated by the root analytics platform pipeline.
    tables:
      - name: portfolio_projects
        description: Raw portfolio project facts written by the pipeline.
        columns:
          - name: project_name
            description: Human-readable analytical asset name.
            tests:
              - not_null
          - name: domain
            description: Portfolio business domain.
            tests:
              - not_null
      - name: repository_registry
        description: Raw registry of locally referenced repositories.
      - name: metric_history
        description: Historical portfolio-level metric series.
      - name: domain_history
        description: Historical domain-level score series.
      - name: project_history
        description: Historical project-level score series.
